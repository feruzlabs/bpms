server:
  port: 8090

spring:
  application:
    name: bpms-new-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/bpms_new}
    username: ${SPRING_DATASOURCE_USERNAME:bpms}
    password: ${SPRING_DATASOURCE_PASSWORD:bpms}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5673}
    username: ${SPRING_RABBITMQ_USERNAME:bpms}
    password: ${SPRING_RABBITMQ_PASSWORD:bpms}
    listener:
      simple:
        auto-startup: ${BPMS_RABBIT_LISTENER_ENABLED:false}
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: ${BPMS_RABBIT_HEALTH_ENABLED:false}

bpms:
  job-queue: ${BPMS_JOB_QUEUE:in-process}
  execution-log:
    enabled: ${BPMS_EXEC_LOG:true}
  versioning:
    # When true, redeploying identical BPMN (same canonical SHA-256) reuses the latest version (plan 35).
    dedup-identical: ${BPMS_VERSIONING_DEDUP:true}

bi:
  endpoint: ${BI_ENDPOINT:}

creditconveyer:
  endpoint: ${CREDITCONVEYER_ENDPOINT:http://172.28.202.107:8085}
  bpms:
    user: ${BPMS_USER:bpms}
    pass: ${BPMS_PASS:bpms}
  login: ${CC_LOGIN:bpms}
  passport: ${CC_PASSPORT:bpms}
  tune:
    endpoint:
      prod: ${CC_TUNE_ENDPOINT:}
    apiAuthBasic: ${CC_TUNE_BASIC:}
  http:
    connect-timeout: 10s
    read-timeout: 60s
    write-timeout: 30s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
