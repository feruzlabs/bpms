services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bpms_new
      POSTGRES_USER: bpms
      POSTGRES_PASSWORD: bpms
    ports: ["5433:5432"]
    volumes: ["bpms_new_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpms -d bpms_new"]
      interval: 5s
      retries: 10
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: bpms
      RABBITMQ_DEFAULT_PASS: bpms
    ports: ["5673:5672", "15673:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 10
volumes:
  bpms_new_pg: {}

