services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bpms_new
      POSTGRES_USER: bpms
      POSTGRES_PASSWORD: bpms
    ports: ["5433:5432"]
    volumes: ["bpms_new_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpms -d bpms_new"]
      interval: 5s
      retries: 10
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: bpms
      RABBITMQ_DEFAULT_PASS: bpms
    ports: ["5673:5672", "15673:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 10
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bpms_new
      SPRING_DATASOURCE_USERNAME: bpms
      SPRING_DATASOURCE_PASSWORD: bpms
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: bpms
      SPRING_RABBITMQ_PASSWORD: bpms
      BPMS_JOB_QUEUE: in-process
      BPMS_RABBIT_HEALTH_ENABLED: "true"
      BPMS_RABBIT_LISTENER_ENABLED: "false"
    ports: ["8090:8090"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      retries: 12
      start_period: 40s
volumes:
  bpms_new_pg: {}

